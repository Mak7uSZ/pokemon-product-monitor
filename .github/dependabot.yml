version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

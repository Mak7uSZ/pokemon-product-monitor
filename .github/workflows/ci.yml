name: ci

on:
  pull_request:
  push:
    branches: [main, master, "sol/**", "codex/**"]

permissions:
  contents: read

jobs:
  release-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Reject credentials, personal data, and runtime artifacts
        run: python scripts/release_guard.py --tracked

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: python -m pip install --no-deps -e ./superparser_modular
      - run: python -m pip install pip-audit==2.10.1
      - run: python -m pip_audit -r requirements.lock --progress-spinner off
      - name: Run deterministic backend suite
        env:
          ACTION_MODE: "off"
          ENABLE_NOTIFICATIONS: "false"
          ENABLE_BOL: "false"
          ENABLE_MEDIAMARKT: "false"
          ENABLE_DREAMLAND: "false"
          ENABLE_POCKETGAMES: "false"
        run: python -m pytest superparser_modular/tests -p no:cacheprovider -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=low
      - run: npm test
      - run: npm run build

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install verified Gitleaks 8.30.1
        run: |
          curl -fsSLO https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks_8.30.1_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
      - run: ./gitleaks git . --redact=100 --no-banner

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
